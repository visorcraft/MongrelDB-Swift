name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.9.2'

      - name: Print Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Offline tests (no daemon)
        run: swift test

  live:
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-22.04
    env:
      SERVER_VERSION: '0.62.0'
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.9.2'

      - name: Print Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Cache mongreldb-server binary
        id: server-cache
        uses: actions/cache@v6
        with:
          path: bin/mongreldb-server
          key: mongreldb-server-linux-x64-musl-${{ env.SERVER_VERSION }}

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL -o bin/mongreldb-server \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-server-linux-x64-musl"
          chmod +x bin/mongreldb-server
          ./bin/mongreldb-server --help | head -n 1

      - name: Start mongreldb-server
        run: |
          rm -rf /tmp/mongreldb-data
          ./bin/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run live tests
        run: swift test

      - name: Compile-check examples
        # The examples are standalone source files (not SPM executable targets),
        # so they can't be `swift run` directly. Instead, type-check each one
        # against the MongrelDB module built by the prior `swift build` step.
        # This catches syntax/type errors and broken API usage without needing
        # a runnable executable target. continue-on-error keeps this best-effort
        # since type-checking relies on the .build/debug module layout.
        continue-on-error: true
        run: |
          for ex in examples/*.swift; do
            echo "=== Type-checking $ex ==="
            swiftc -typecheck -I.build/debug "$ex" || { echo "FAILED: $ex"; exit 1; }
          done

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi
